<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Form</title>
    <style>
        body {
            color: #fff;
            background: #000;
        }

        main {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        label {
            font-family: monospace;
            color: rgb(0, 255, 0);
        }
    </style>

</head>

<body>
    <header>
        <h1>Google Form</h1>
    </header>
    <main>
        <section>
            <form id="hint-form" action="https://www.google.com/search">
                <label id='hint-label' for="hint-input">Hint without solution: </label>
                <input id="hint-input" type="text" name="q"><button type="submit">Search</button>
            </form>
        </section>
        <section>
            <form id="safe-form" action="https://www.google.com/search">
                <label id='safe-label' for="safe-input">Is it safe? </label>
                <input id="safe-input" type="text" name="q"><button type="submit">Search</button>
            </form>
        </section>
        <section>
            <form id="general-form" action="https://www.google.com/search">
                <label id='general-label' for="general-input"></label>
                <input id="general-input" type="text" name="q"><button type="submit">Search</button>
            </form>
        </section>
        <h2>History:</h2>
        <ol id="history"></ol>
    </main>

    <script src="script.js"></script>
</body>

</html>
