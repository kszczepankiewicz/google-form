<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Form</title>
    <style>
        body {
            color: #fff;
            background: #000;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
    </style>

</head>

<body>
    <form id="hint-form" action="https://www.google.com/search">
        <label for="hint-input">Hint: </label>
        <input id="hint-input" type="text" name="q"><button type="submit">Search</button>
    </form>
    <form id="safe-form" action="https://www.google.com/search">
        <label for="safe-input">Safe: </label>
        <input id="safe-input" type="text" name="q"><button type="submit">Search</button>
    </form>
    <script src="script.js"></script>
</body>

</html>
